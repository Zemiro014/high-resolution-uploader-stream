AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestrutura Completa VOD - Rede, RDS e ECS Fargate.

Resources:
  # --- REDE (VPC) ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-vod-project

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ------------------ BANCO DE DADOS (RDS) -----------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets para o RDS
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  PostgresDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: voddb
      Engine: postgres
      MasterUsername: dbadmin
      MasterUserPassword: SenhaSegura123
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: '20'
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: true

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso ao Postgres
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0

  # Security Group para o Load Balancer (Porta 80)
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permite entrada na 80 para o CloudFront
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # --- LOAD BALANCER ---
  PublicLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: vod-backend-alb
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
        # O SG já permite a porta 3000
      Type: application

  # O "Alvo": Onde o tráfego deve chegar
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: vod-backend-tg
      VpcId: !Ref VPC
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: / # Certifique-se que seu Node.js responde 200 aqui
      HealthCheckIntervalSeconds: 30
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '60'
        - Key: stickiness.enabled
          Value: 'true'

  # O "Ouvinte": Escuta na porta 80 do ALB e manda para a porta 3000 do Node
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/vod-backend-task
      RetentionInDays: 7 # Limpa logs velhos automaticamente

  # 1. Permissão para o S3 chamar a Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt VideoTriggerLambda.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::video-storage-${AWS::AccountId}

  # --- BUCKET PARA ARMAZENAR OS VÍDEOS ---
  VideoStorageBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaInvokePermission
    Properties:
      BucketName: !Sub video-storage-${AWS::AccountId}
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt VideoTriggerLambda.Arn
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - POST
              - GET
            AllowedOrigins:
              - '*'
              # Em produção, use o DNS do CloudFront
            MaxAge: 3000

  # --- BUCKET DE SAÍDA (VÍDEOS PROCESSADOS) ---
  VideoProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub video-processed-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
            AllowedOrigins:
              - '*'

  # --- ROLE PARA O MEDIACONVERT ---
  MediaConvertRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: mediaconvert.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonAPIGatewayInvokeFullAccess # Para logs e métricas

  MediaConvertRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Monitora jobs do MediaConvert
      EventPattern:
        source:
          - aws.mediaconvert
        detail-type:
          - MediaConvert Job State Change
        detail:
          status:
            - COMPLETE
      State: ENABLED
      Targets:
        - Arn: !GetAtt NotifyBackendLambda.Arn
          Id: NotifyBackendTarget

  # Permissão para o EventBridge chamar a Lambda
  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NotifyBackendLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MediaConvertRule.Arn

  # --- ROLE PARA A LAMBDA ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3AndMediaConvertPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Permissão para ler o vídeo e os metadados (resolve o 403)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectTagging
                Resource: !Sub arn:aws:s3:::video-storage-${AWS::AccountId}/*

              # Permissão para o MediaConvert
              - Effect: Allow
                Action:
                  - mediaconvert:DescribeEndpoints
                  - mediaconvert:CreateJob
                  - iam:PassRole
                Resource: '*'

              # Logs básicos
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # Definição da Lambda e Permissão de Invocação pelo S3
  VideoTriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: s3-to-mediaconvert
      Handler: index.lambda_handler # 'index' é o nome do arquivo, 'lambda_handler' a função
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.11
      Timeout: 30
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref VideoProcessedBucket
          MEDIACONVERT_ROLE_ARN: !GetAtt MediaConvertRole.Arn
          MEDIACONVERT_ENDPOINT: https://amazonaws.com
      Code:
        ZipFile: |
          import boto3
          import os
          import urllib.parse

          def lambda_handler(event, context):
              # 1. Pegar dados do arquivo que subiu no S3
              # Adicionado [0] para pegar o primeiro registro do evento
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'])
              output_bucket = os.environ['OUTPUT_BUCKET']
              mc_role = os.environ['MEDIACONVERT_ROLE_ARN']

              # 2. Buscar o endpoint específico da conta
              mc_client = boto3.client('mediaconvert', region_name=os.environ['AWS_REGION'])
              endpoints = mc_client.describe_endpoints()
              endpoint_url = endpoints['Endpoints'][0]['Url']

              # Criar cliente específico para o endpoint da conta
              client = boto3.client('mediaconvert', endpoint_url=endpoint_url)

              # 3. Busca o ID nos metadados (via head_object)
              s3_client = boto3.client('s3')
              response = s3_client.head_object(Bucket=bucket, Key=key)
              # IMPORTANTE: S3 converte metadados para minúsculas.
              # No Node use "fileId", aqui busque "fileId".
              file_id = response['Metadata'].get('fileId')

              job_settings = {
                  "Inputs": [{
                      "FileInput": f"s3://{bucket}/{key}"
                  }],
                  "OutputGroups": [{
                      "Name": "File Group",
                      "OutputGroupSettings": {
                          "Type": "FILE_GROUP_SETTINGS",
                          "FileGroupSettings": {
                              "Destination": f"s3://{output_bucket}/processed/"
                          }
                      },
                      "Outputs": [{
                          "VideoDescription": {
                              "CodecSettings": {
                                  "Codec": "H_264",
                                  "H264Settings": {
                                      "MaxBitrate": 5000000,
                                      "RateControlMode": "QVBR",
                                      "QvbrSettings": {
                                            "QvbrQualityLevel": 7       # Nível de qualidade (1-10, 7 é ótimo para HD)
                                        },
                                      "SceneChangeDetect": "ENABLED"
                                  }
                              }
                          },
                          "ContainerSettings": { "Container": "MP4" }
                      }]
                  }]
              }

              # 2. Crie os metadados separadamente
              user_metadata = {
                  "fileId": str(file_id) if file_id else "unknown"
              }

              try:
                  # 3. Passe o UserMetadata FORA do Settings
                  response = client.create_job(
                      Role=mc_role, 
                      Settings=job_settings,
                      UserMetadata=user_metadata # <-- O lugar correto é aqui
                  )
                  print(f"✅ Job Created: {response['Job']['Id']}")
              except Exception as e:
                  print(f"❌ Error creating job: {str(e)}")
                  raise e

  # Lambda que avisa o Node.js
  NotifyBackendLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.11
      Environment:
        Variables:
          BACKEND_URL: !Sub http://${PublicLoadBalancer.DNSName}/api/storage/confirm-upload
      Code:
        ZipFile: |
          import json
          import urllib.request
          import os

          def lambda_handler(event, context):
              try:
                  detail = event.get('detail', {})
                  status = detail.get('status')
                  user_metadata = detail.get('userMetadata', {})
                  file_id = user_metadata.get('fileId')
                  
                  # Pega o caminho do arquivo processado com segurança
                  output_groups = detail.get('outputGroupDetails', [])
                  if not output_groups:
                      print("Nenhum grupo de saída encontrado")
                      return
                  
                  output_file = output_groups[0]['outputDetails'][0]['outputFilePaths'][0]
                  file_name = output_file.split('/')[-1]

                  if status == 'COMPLETE' and file_id:
                      # Garante que a URL tenha o formato correto
                      base_url = os.environ['BACKEND_URL'].rstrip('/')
                      url = f"{base_url}/{file_id}"
                      
                      print(f"Tentando notificar backend na URL: {url}")
                      
                      # IMPORTANTE: Mude para status PROCESSED
                      payload = {
                          "status": "PROCESSED", 
                          "processedKey": f"processed/{file_name}"
                      }
                      
                      data = json.dumps(payload).encode('utf-8')
                      req = urllib.request.Request(url, data=data, method='PATCH')
                      req.add_header('Content-Type', 'application/json')

                      with urllib.request.urlopen(req) as res:
                          print(f"✅ Backend notificado com sucesso: {res.getcode()}")
                  else:
                      print(f"Job não concluído ou sem fileId. Status: {status}, FileId: {file_id}")
                      
              except Exception as e:
                  print(f"❌ Erro na Lambda de Notificação: {str(e)}")
                  raise e

  # --- ECS FARGATE ---
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: vod-cluster

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: S3VideoUploadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                # Referencia o novo bucket dinamicamente
                Resource: !Sub arn:aws:s3:::${VideoStorageBucket}/*

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com # Corrigido aqui
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # --- BACKEND ECS FARGATE ---
  BackendTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: vod-backend-task
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !Ref ECSTaskRole
      ContainerDefinitions:
        - Name: backend-api
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/vod-backend:latest
          PortMappings:
            - ContainerPort: 3000
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/vod-backend-task
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: DATABASE_URL
              # O CloudFormation resolve o Endpoint do banco automaticamente aqui!
              Value: !Sub postgresql://dbadmin:SenhaSegura123@${PostgresDB.Endpoint.Address}:5432/voddb?schema=public
            - Name: PORT
              Value: '3000'
            - Name: S3_BUCKET_NAME
              Value: !Ref VideoStorageBucket

  BackendService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: backend-service-api # Nome fixo e amigável
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTask
      LaunchType: FARGATE
      DesiredCount: 1
      LoadBalancers:
        - ContainerName: backend-api
          ContainerPort: 3000
          TargetGroupArn: !Ref BackendTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
          SecurityGroups:
            - !Ref BackendSG

  # 2. AJUSTE: Security Group do Backend (Porta 3000 vinda do ALB)
  BackendSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to Backend from ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup # Referência ao SG do ALB

  # --- BUCKET PARA O REACT (FRONTEND) ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-frontend-static-${AWS::AccountId}
      # Configuração para o CloudFront conseguir ler os arquivos
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- PERMISSÃO PARA O CLOUDFRONT LER O S3 ---
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub OAI para ${AWS::StackName}

  # --- POLÍTICA DO BUCKET ---
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
      # Política para o CloudFront ler o bucket de processados
  VideoProcessedBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VideoProcessedBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${VideoProcessedBucket.Arn}/*

  # --- CLOUDFRONT COMO PROXY (REACT + API) --
  MyDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          # Origem 1: Arquivos estáticos do React no S3
          - Id: ReactS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}
          - Id: ProcessedVideosOrigin
            DomainName: !GetAtt VideoProcessedBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}
          # Origem 2: O Load Balancer (ALB) que aponta para o seu Java no ECS
          - Id: BackendOrigin
            DomainName: !GetAtt PublicLoadBalancer.DNSName # Pega o DNS do ALB dinamicamente
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only

        # Comportamento Padrão: Entrega o React (S3)
        DefaultCacheBehavior:
          TargetOriginId: ReactS3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false

        # Comportamento para API: Tudo que for /api/* vai para o BackEnd (ECS via ALB)
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: BackendOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            ForwardedValues:
              QueryString: true
              Headers:
                - Host # <--- FUNDAMENTAL para resolver o 504
                - Origin # Necessário para o CORS
                - Content-Type # Necessário para o POST do Node
                - Access-Control-Request-Headers
                - Access-Control-Request-Method
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
              # API não pode ter cache para a Presigned URL
              # 2. ROTA ADICIONADA: Para os vídeos processados (S3)
          - PathPattern: /processed/*
            TargetOriginId: ProcessedVideosOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            ForwardedValues:
              QueryString: false
              # Encaminha Origin para o S3 lidar com o CORS do Player de Vídeo
              Headers:
                - Origin
                - Access-Control-Request-Headers
                - Access-Control-Request-Method
              Cookies:
                Forward: none
            MinTTL: 86400 # Pode cachear vídeos por 24h
            DefaultTTL: 86400

Outputs:
  BackendUrl:
    Description: URL do Backend (IP Publico sera gerado pelo ECS)
    Value: !Sub Acesse o console do ECS para pegar o IP Publico da Task na porta 3000

  FrontendBucketName:
    Description: Nome do Bucket para configurar no GitHub Secrets (S3_BUCKET_NAME)
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: ID da Distribuição para configurar no GitHub Secrets (CLOUDFRONT_DIST_ID)
    Value: !Ref MyDistribution

  CloudFrontDomainName:
    Description: URL final do seu projeto para acessar no navegador
    Value: !GetAtt MyDistribution.DomainName