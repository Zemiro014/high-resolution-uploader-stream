AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestrutura Completa VOD - Rede, RDS e ECS Fargate.

Resources:
  # --- REDE (VPC) ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: vpc-vod-project

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select
        - 1
        - !GetAZs ''
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # --- BANCO DE DADOS (RDS) ---
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets para o RDS
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  PostgresDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: voddb
      Engine: postgres
      MasterUsername: dbadmin
      MasterUserPassword: SenhaSegura123
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: '20'
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: true

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso ao Postgres
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0

  # --- LOAD BALANCER ---
  PublicLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: vod-backend-alb
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref BackendSG
        # O SG já permite a porta 3000
      Type: application

  # O "Alvo": Onde o tráfego deve chegar
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: vod-backend-tg
      VpcId: !Ref VPC
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: / # Certifique-se que seu Node.js responde 200 aqui
      HealthCheckIntervalSeconds: 30

  # O "Ouvinte": Escuta na porta 80 do ALB e manda para a porta 3000 do Node
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # --- ECS FARGATE ---
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: vod-cluster

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com # Corrigido aqui
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # --- BACKEND ECS FARGATE ---
  BackendTask:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: vod-backend-task
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      ContainerDefinitions:
        - Name: backend-api
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/vod-backend:latest
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: DATABASE_URL
              # O CloudFormation resolve o Endpoint do banco automaticamente aqui!
              Value: !Sub postgresql://dbadmin:SenhaSegura123@${PostgresDB.Endpoint.Address}:5432/voddb?schema=public
            - Name: PORT
              Value: '3000'
            - Name: S3_BUCKET_NAME
              Value: !Sub vod-storage-${AWS::AccountId} # Deve bater com o nome do recurso S3

  BackendService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: backend-service-api # Nome fixo e amigável
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTask
      LaunchType: FARGATE
      DesiredCount: 1
      LoadBalancers:
        - ContainerName: backend-api
          ContainerPort: 3000
          TargetGroupArn: !Ref BackendTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
          SecurityGroups:
            - !Ref BackendSG

  BackendSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to Backend
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  # --- BUCKET PARA O REACT (FRONTEND) ---
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-frontend-static-${AWS::AccountId}
      # Configuração para o CloudFront conseguir ler os arquivos
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- PERMISSÃO PARA O CLOUDFRONT LER O S3 ---
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub OAI para ${AWS::StackName}

  # --- POLÍTICA DO BUCKET ---
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  # --- CLOUDFRONT COMO PROXY (REACT + API) --
  MyDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          # Origem 1: Arquivos estáticos do React no S3
          - Id: ReactS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}

          # Origem 2: O Load Balancer (ALB) que aponta para o seu Java no ECS
          - Id: BackendOrigin
            DomainName: !GetAtt PublicLoadBalancer.DNSName # Pega o DNS do ALB dinamicamente
            CustomOriginConfig:
              HTTPPort: 3000
              OriginProtocolPolicy: http-only

        # Comportamento Padrão: Entrega o React (S3)
        DefaultCacheBehavior:
          TargetOriginId: ReactS3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false

        # Comportamento para API: Tudo que for /api/* vai para o BackEnd (ECS via ALB)
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: BackendOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            ForwardedValues:
              QueryString: true
              Headers:
                - Origin
                - Access-Control-Request-Headers
                - Access-Control-Request-Method
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0 # API não pode ter cache para a Presigned URL

Outputs:
  BackendUrl:
    Description: URL do Backend (IP Publico sera gerado pelo ECS)
    Value: !Sub Acesse o console do ECS para pegar o IP Publico da Task na porta 3000

  FrontendBucketName:
    Description: Nome do Bucket para configurar no GitHub Secrets (S3_BUCKET_NAME)
    Value: !Ref FrontendBucket
  
  CloudFrontDistributionId:
    Description: ID da Distribuição para configurar no GitHub Secrets (CLOUDFRONT_DIST_ID)
    Value: !Ref MyDistribution

  CloudFrontDomainName:
    Description: URL final do seu projeto para acessar no navegador
    Value: !GetAtt MyDistribution.DomainName